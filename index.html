<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Zwe Htet Paing — AI/ML Engineer portfolio. Machine learning, NLP, generative AI, and end-to-end ML deployment." />

    <!-- Preconnect for Google Fonts (Geist + JetBrains Mono + Material Symbols) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Geist variable font (display + body) + JetBrains Mono (labels, code) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Material Symbols Outlined (icons used throughout the UI) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block"
      rel="stylesheet"
    />

    <title>Zwe Htet Paing — AI/ML Engineer</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // No-flash theme boot — runs synchronously before <div id="root">
      // paints so users never see the wrong theme. Reads localStorage
      // (key 'theme'); falls back to 'dark' (the default) if missing.
      (function () {
        try {
          var saved = localStorage.getItem('theme');
        } catch (e) {
          var saved = null;
        }
        var theme = saved === 'light' ? 'light' : 'dark';
        document.documentElement.classList.add(theme);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
